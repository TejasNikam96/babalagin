# Dev profile: FILE-BASED H2 database, so data PERSISTS across restarts
# (stored in ./data/matrimonialdb.mv.db under the project folder).
# Activate with:  java -jar target\loginapp-0.0.1-SNAPSHOT.jar --spring.profiles.active=dev
# H2 console:  http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:file:./data/matrimonialdb)

spring.datasource.url=jdbc:h2:file:./data/matrimonialdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
