spring.application.name=loginapp
server.port=8080

# Use the Ant path matcher so the SPA fallback route (/**/{path:[^.]*}) is valid.
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ---------------------------------------------------------------------------
# Database (MySQL) -- default profile.
# Assumes a MySQL server on localhost:3306. The schema "matrimonial" is created
# automatically if missing, and Hibernate creates/updates the tables.
# Override the username/password to match your MySQL setup.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/matrimonial?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ---------------------------------------------------------------------------
# File uploads (payment screenshots). Frontend allows up to 5MB images.
# ---------------------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/payments

# ---------------------------------------------------------------------------
# Email notifications (DISABLED by default — only important notifications are
# emailed: payment decisions, interest received/accepted).
# To enable: set app.email.enabled=true AND configure an SMTP server below.
#   Gmail example: host=smtp.gmail.com, port=587, username=you@gmail.com,
#   password=<Gmail App Password>, starttls=true.
# ---------------------------------------------------------------------------
app.email.enabled=false
app.email.from=BABA LAGIN <no-reply@babalagin.in>
